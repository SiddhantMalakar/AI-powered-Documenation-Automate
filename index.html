<!DOCTYPE html>
<html>
<head>
    <title>AI Project Documentation Tool</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Word Export Libraries -->
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body class="container mt-5">

<h2 class="mb-4">AI Project Documentation Generator</h2>

<form id="projectForm" class="mb-4">
    <input class="form-control mb-2" type="text" id="projectName" placeholder="Project Name" required>
    <input class="form-control mb-2" type="text" id="industry" placeholder="Industry" required>
    <input class="form-control mb-2" type="text" id="duration" placeholder="Duration (e.g., 2 months)" required>
    <input class="form-control mb-2" type="number" id="teamSize" placeholder="Team Size" required>
    <textarea class="form-control mb-2" id="objective" placeholder="Project Objective" required></textarea>
    <textarea class="form-control mb-2" id="features" placeholder="Key Features (comma separated)" required></textarea>

    <button class="btn btn-primary" type="submit">Generate Documentation</button>
</form>

<h4>Generated JSON Output</h4>
<pre id="output" class="bg-light p-3"></pre>

<button id="downloadBtn" class="btn btn-success mt-3">Download JSON</button>
<button id="wordBtn" class="btn btn-secondary mt-3">Download Word</button>

<script src="script.js"></script>

</body>
</html>
